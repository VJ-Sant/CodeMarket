<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login Page</h2>

<input type="text"
       id="username"
       placeholder="Username">

<br><br>

<input type="password"
       id="password"
       placeholder="Password">

<br><br>

<button onclick="login()">
    Login
</button>

<script>

async function login() {

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    const response =
        await fetch(
            "http://localhost:8080/auth/login",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                    username,
                    password
                })
            }
        );

    const token =
        await response.text();

    localStorage.setItem(
        "token",
        token
    );

    alert("token" + token);
}

</script>

</body>
</html>
